pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,mts,cts,json,jsonc,css}"
      run: bunx biome check --no-errors-on-unmatched --files-ignore-unknown=true --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: typecheck
      run: bun run check-types
    - name: test
      run: bun run test
